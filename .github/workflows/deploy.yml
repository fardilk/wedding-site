name: Deploy Wedding Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Clone jika belum ada, pull jika sudah ada
            if [ ! -d "/root/wedding-site" ]; then
              git clone https://github.com/fardilk/wedding-site.git /root/wedding-site
            fi

            cd /root/wedding-site
            git pull origin main

            # Build dan jalankan container
            docker compose up -d --build

            # Hapus image lama yang tidak terpakai
            docker image prune -f
